name: Bun CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - run: |
          bun install --frozen-lockfile
          cd app
          bun install --frozen-lockfile
      - run: bun run build --if-present
