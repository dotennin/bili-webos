# This workflow will do a clean installation of node dependencies, cache/restore them, build the source code and run tests on Node.js 24
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-nodejs

name: Node.js CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [24.x]
        # See supported Node.js release schedule at https://nodejs.org/en/about/releases/

    steps:
    - uses: actions/checkout@v4
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
    - run: npm ci
    - run: npm run build --if-present
    - run: npm test

  coverage:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
    - uses: actions/checkout@v4
    - name: Use Node.js 24.x
      uses: actions/setup-node@v4
      with:
        node-version: 24.x
        cache: 'npm'
    - run: npm ci
    - name: Generate coverage report
      run: npm run test:coverage
    - name: Upload lcov artifact
      uses: actions/upload-artifact@v4
      with:
        name: coverage-report
        path: coverage/lcov.info
    - name: Generate coverage badge
      uses: tj-actions/coverage-badge-js@v2
      with:
        report_path: coverage/lcov.info
        output_path: coverage/badge.svg
    - name: Commit coverage badge on main
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      uses: stefanzweifel/git-auto-commit-action@v5
      with:
        commit_message: 'chore(ci): update coverage badge'
        file_pattern: coverage/badge.svg
