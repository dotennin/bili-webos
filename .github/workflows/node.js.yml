name: Node.js CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: write
  pull-requests: write

jobs:
  build-test-coverage:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [24.x]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build --if-present

      - name: Run tests with coverage
        run: npx --yes c8 --reporter=text-summary --reporter=json-summary npm test

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-summary
          path: coverage/coverage-summary.json

      - name: Coverage report on PR
        if: github.event_name == 'pull_request'
        uses: greatwizard/coverage-diff-action@v1
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          base-summary-filename: coverage-base-summary.json
          head-summary-filename: coverage/coverage-summary.json
          generate-compare-comment: true
          generate-compare-badge: false
          path-prefix: app/

      - name: Update coverage badge data on main
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: we-cli/coverage-badge-action@main
        with:
          output: docs/coverage.svg
          report: coverage/coverage-summary.json
          badge-branch: document
